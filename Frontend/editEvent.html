<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Event</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">

        <h1>Edit Event</h1>

        <form id="editEventForm">

            <input
                type="text"
                id="title"
                placeholder="Event Title"
                required
            >

            <textarea
                id="description"
                placeholder="Description"
                rows="5"
                required
            ></textarea>

            <input
                type="date"
                id="date"
                required
            >

            <input
                type="text"
                id="venue"
                placeholder="Venue"
                required
            >

            <input
                type="number"
                id="seats"
                placeholder="Seats"
                required
            >

            <button type="submit">
                Update Event
            </button>

        </form>

        <br>

        <a href="myHostedEvents.html">
            ← Back
        </a>

    </div>

    <script src="js/app.js"></script>

</body>

</html>
