<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Signup</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav id="mainNav">
    <a href="index.html" class="logo">✦ NexMeet</a>
</nav>

<div id="authCard">
    <h2>Signup</h2>

    <div id="signupError" class="form-error" hidden></div>

    <form id="signupForm">

        <input
            type="text"
            id="name"
            placeholder="Enter Name"
            required
        >

        <input
            type="email"
            id="email"
            placeholder="Enter Email"
            required
        >

        <div class="password-field">
            <input
                type="password"
                id="password"
                placeholder="Enter Password"
                required
            >
            <span id="togglePassword">👁</span>
        </div>

        <button type="submit">
            Register
        </button>

    </form>

    <a href="login.html" class="inline-link">
        Already have an account? Login
    </a>
</div>

<div id="toastContainer"></div>

<script src="js/app.js"></script>

</body>

</html>
